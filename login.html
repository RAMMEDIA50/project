<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh;">

<div style="width:300px;">
<h4>Login</h4>

<input id="user" class="form-control mb-2" placeholder="Username">
<input id="pass" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-primary w-100" onclick="login()">Login</button>

<a href="/register-page" class="text-white d-block mt-2">Create Account</a>
</div>

<script>
async function login(){
let res = await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
username:document.getElementById("user").value,
password:document.getElementById("pass").value
})
});

let data = await res.json();

if(data.status==="success"){
localStorage.setItem("auth","true");
localStorage.setItem("role",data.role);
window.location.href="/dashboard";
}else{
alert("Invalid login");
}
}
</script>

</body>
</html>
