<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh;">

<div style="width:300px;">
<h4>Create Account</h4>

<input id="user" class="form-control mb-2" placeholder="Username">
<input id="pass" type="password" class="form-control mb-2" placeholder="Password">

<button class="btn btn-success w-100" onclick="register()">Register</button>

<a href="/" class="text-white d-block mt-2">Back to Login</a>
</div>

<script>
async function register(){
await fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
username:document.getElementById("user").value,
password:document.getElementById("pass").value
})
});

alert("Account created");
}
</script>

</body>
</html>
